# Site settings
title: Aaron Myrold's Digital Garden
tagline: Portfolio & Digital Garden
description: Bioinformatics and Data Science Projects
baseurl: ""
url: https://amyrold.github.io
repository: amyrold/amyrold.github.io

# Build settings
markdown: kramdown
theme: null
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-relative-links
  - jekyll-tidy

# Jekyll Garden settings (keep original settings)
## Homepage config
preferences:
  search:
    enabled: true
  wiki_style_link: 
    enabled: true
  pagepreview: 
    enabled: true
  backlinks:
    enabled: true
  homepage: 
    enabled: true

# Private links config
privatelinks:
  title: Private or Broken Links
  msg: The page you're looking for is either not available or private!

# Collections for notes and portfolio projects
collections:
  notes:
    output: true
    permalink: /:collection/:path/
  projects:
    output: true
    permalink: /portfolio/:path/

# Default layouts
defaults:
  - scope:
      path: "_notes/**/*.md"
    values:
      layout: Post
      content-type: notes
  - scope:
      path: "_projects"
    values:
      layout: Project
      content-type: project

# Digital Garden settings
use_html_extension: false
use_backlinks: true
open_external_links_in_new_tab: true
embed_tweets: false

# Exclude from processing
exclude:
  - .obsidian
  - _notes/private
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
